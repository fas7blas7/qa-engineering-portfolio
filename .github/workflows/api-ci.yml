name: API CI Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 02-api-qa/dockerized-api-qa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start API with Docker
        run: docker compose up -d --build

      - name: Wait for API
        run: sleep 15

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: |
          newman run newman/collections/reqres.json \
            -e newman/environments/reqres.env.json \
            -r cli,htmlextra \
            --verbose \
            --bail

      - name: Shutdown Docker
        if: always()
        run: docker compose down